openapi: 3.0.3
info:
  title: GitHub Release Notification API
  description: |
    A monolithic PHP API that allows users to subscribe to GitHub repository release notifications.
    Subscribers receive email confirmations and are notified when new releases are published.
  version: 1.0.0
  contact:
    name: Release Notification API
servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Subscriptions
    description: Subscription management endpoints

paths:
  /api/subscribe:
    post:
      tags:
        - Subscriptions
      summary: Subscribe to release notifications
      description: |
        Subscribe an email address to receive notifications for new GitHub repository releases.
        A confirmation email will be sent; the subscription is inactive until confirmed.
      operationId: subscribe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscribeRequest'
            example:
              email: user@example.com
              repo: owner/repository
      responses:
        '201':
          description: Subscription created, confirmation email sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Subscription created. Please check your email to confirm.
        '400':
          description: Validation error (invalid email or repository format)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              examples:
                invalid_email:
                  summary: Invalid email
                  value:
                    message: Invalid email
                invalid_repo_format:
                  summary: Invalid repository format
                  value:
                    message: "Invalid repository format 'badrepo'. Expected format: owner/repo"
                missing_fields:
                  summary: Missing required fields
                  value:
                    message: Fields "email" and "repo" are required
        '404':
          description: Repository not found on GitHub
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: "Repository not found: owner/nonexistent"
        '409':
          description: Email is already subscribed to this repository
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: "Email 'user@example.com' is already subscribed to 'owner/repo'"

  /api/confirm/{token}:
    get:
      tags:
        - Subscriptions
      summary: Confirm a subscription
      description: |
        Confirm a pending subscription using the token sent in the confirmation email.
        This operation is idempotent — confirming an already-confirmed subscription returns 200.
        On first confirmation, the current latest release tag is stored to prevent spam.
      operationId: confirmSubscription
      parameters:
        - name: token
          in: path
          required: true
          description: 64-character hex confirmation token from the email
          schema:
            type: string
            pattern: '^[0-9a-f]{64}$'
            example: a3f1b2c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a2
      responses:
        '200':
          description: Subscription confirmed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Subscription confirmed successfully
        '400':
          description: Invalid token format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Invalid token format
        '404':
          description: Token not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Token not found

  /api/unsubscribe/{token}:
    get:
      tags:
        - Subscriptions
      summary: Unsubscribe from release notifications
      description: |
        Unsubscribe using the token included in notification emails.
        This permanently deletes the subscription record.
      operationId: unsubscribe
      parameters:
        - name: token
          in: path
          required: true
          description: 64-character hex unsubscribe token from the email
          schema:
            type: string
            pattern: '^[0-9a-f]{64}$'
            example: f1e2d3c4b5a6978869504132231405f6e7d8c9b0a1f2e3d4c5b6a7988970614253
      responses:
        '200':
          description: Unsubscribed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Unsubscribed successfully
        '400':
          description: Invalid token format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Invalid token format
        '404':
          description: Token not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Token not found

  /api/subscriptions:
    get:
      tags:
        - Subscriptions
      summary: List confirmed subscriptions for an email
      description: Returns all confirmed (active) subscriptions for the given email address.
      operationId: getSubscriptions
      parameters:
        - name: email
          in: query
          required: true
          description: The email address to look up
          schema:
            type: string
            format: email
            example: user@example.com
      responses:
        '200':
          description: List of confirmed subscriptions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Subscription'
              example:
                - email: user@example.com
                  repo: owner/repo
                  confirmed: true
                  last_seen_tag: v1.2.3
        '400':
          description: Missing or invalid email parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              examples:
                missing_email:
                  summary: Missing email
                  value:
                    message: Query parameter "email" is required
                invalid_email:
                  summary: Invalid email format
                  value:
                    message: Invalid email

components:
  schemas:
    SubscribeRequest:
      type: object
      required:
        - email
        - repo
      properties:
        email:
          type: string
          format: email
          description: Email address to receive notifications
          example: user@example.com
        repo:
          type: string
          description: GitHub repository in "owner/repo" format
          pattern: '^[a-zA-Z0-9_.\-]+/[a-zA-Z0-9_.\-]+$'
          example: owner/repository

    Subscription:
      type: object
      properties:
        email:
          type: string
          format: email
          description: Subscriber email address
          example: user@example.com
        repo:
          type: string
          description: GitHub repository in "owner/repo" format
          example: owner/repository
        confirmed:
          type: boolean
          description: Whether the subscription has been confirmed
          example: true
        last_seen_tag:
          type: string
          nullable: true
          description: The last release tag for which a notification was sent (or the tag at time of confirmation)
          example: v1.2.3

    MessageResponse:
      type: object
      properties:
        message:
          type: string
          description: Human-readable response message
          example: Operation completed successfully
