<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscribe to GitHub Release Notifications</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: #f6f8fa;
            color: #24292e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            background: #fff;
            border: 1px solid #d0d7de;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 1px 3px rgba(27,31,36,.12);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
        }

        .logo svg { flex-shrink: 0; }

        .logo-text {
            font-size: 18px;
            font-weight: 600;
            color: #24292e;
        }

        h1 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: #57606a;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        input[type="email"],
        input[type="text"] {
            width: 100%;
            padding: 8px 12px;
            font-size: 14px;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            outline: none;
            transition: border-color .15s, box-shadow .15s;
            background: #fff;
            color: #24292e;
        }

        input[type="email"]:focus,
        input[type="text"]:focus {
            border-color: #0969da;
            box-shadow: 0 0 0 3px rgba(9,105,218,.15);
        }

        .field { margin-bottom: 18px; }

        .hint {
            font-size: 12px;
            color: #57606a;
            margin-top: 4px;
        }

        button[type="submit"] {
            width: 100%;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            background: #2ea44f;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background .15s;
            margin-top: 4px;
        }

        button[type="submit"]:hover { background: #2c974b; }
        button[type="submit"]:disabled { background: #94d3a2; cursor: not-allowed; }

        .alert {
            display: none;
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 14px;
            margin-top: 20px;
            line-height: 1.5;
        }

        .alert.success {
            background: #dafbe1;
            border: 1px solid #aceebb;
            color: #1a4731;
        }

        .alert.error {
            background: #ffebe9;
            border: 1px solid #ffcecb;
            color: #6e1c18;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <svg width="28" height="28" viewBox="0 0 16 16" fill="#24292e" aria-hidden="true">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
                     0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
                     -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
                     .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
                     -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27
                     .68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12
                     .51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
                     0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </svg>
        <span class="logo-text">Release Notifications</span>
    </div>

    <h1>Subscribe to releases</h1>
    <p class="subtitle">Get an email whenever a new release is published for a GitHub repository.</p>

    <form id="subscribeForm" novalidate>
        <div class="field">
            <label for="email">Email address</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="field">
            <label for="repo">GitHub repository</label>
            <input type="text" id="repo" name="repo" placeholder="owner/repository" required autocomplete="off"
                   pattern="^[a-zA-Z0-9_.\-]+/[a-zA-Z0-9_.\-]+$">
            <p class="hint">Format: <code>owner/repo</code> — for example <code>golang/go</code></p>
        </div>
        <button type="submit" id="submitBtn">Subscribe</button>
    </form>

    <div class="alert" id="alertBox" role="alert"></div>
</div>

<script>
    const form       = document.getElementById('subscribeForm');
    const submitBtn  = document.getElementById('submitBtn');
    const alertBox   = document.getElementById('alertBox');

    function showAlert(type, message) {
        alertBox.className = 'alert ' + type;
        alertBox.textContent = message;
        alertBox.style.display = 'block';
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value.trim();
        const repo  = document.getElementById('repo').value.trim();

        alertBox.style.display = 'none';
        submitBtn.disabled = true;
        submitBtn.textContent = 'Subscribing…';

        try {
            const res = await fetch('/api/subscribe', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, repo }),
            });

            const data = await res.json();

            if (res.ok) {
                showAlert('success', data.message || 'Subscription created. Please check your email to confirm.');
                form.reset();
            } else {
                showAlert('error', data.message || 'Something went wrong. Please try again.');
            }
        } catch {
            showAlert('error', 'Could not reach the server. Please check your connection and try again.');
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Subscribe';
        }
    });
</script>
</body>
</html>
